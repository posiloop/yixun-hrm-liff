<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>益循生活員工系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{--g:#2E7227;--g2:#3a8a31;--bg:#f4f7f3;--card:#fff;--line:#e2e9e0;--err:#c0392b;--muted:#7a857a;--amber:#b7791f;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:#1d271c;font-size:15px;line-height:1.5;}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom));}
header{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
header img{height:28px;}
header .t{font-size:17px;font-weight:800;}
header .role{margin-left:auto;font-size:12px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.body{padding:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;}
.sec{font-weight:800;color:var(--g);font-size:15px;margin:2px 0 12px;display:flex;align-items:center;gap:7px;}
.sec .ic{width:22px;height:22px;background:var(--g);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
label{display:block;font-size:13px;color:#3a463a;margin:12px 0 5px;font-weight:600;}
label .req{color:var(--err);}
input,select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fcfdfc;}
textarea{min-height:90px;resize:vertical;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--g2);}
input.bad{border-color:var(--err);background:#fdf3f3;}
input.miss{border-color:#f0c5c0;background:#fdf1f0;}
.miss-tag{font-size:10.5px;color:var(--err);background:#fdecea;border-radius:10px;padding:1px 8px;margin-left:6px;font-weight:700;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
.row2{display:flex;gap:10px;}.row2>div{flex:1;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--g);color:#fff;font-size:16px;font-weight:800;margin-top:8px;font-family:inherit;}
.btn:active{background:var(--g2);}
.btn.sec{background:#eef4ec;color:var(--g);}
.btn.warn{background:#fdecea;color:var(--err);}
.btn.sm{width:auto;padding:8px 14px;font-size:13px;margin:0;}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 14px rgba(0,0,0,.06);}
.tabbar button{flex:1;border:none;background:none;padding:9px 0 7px;color:var(--muted);font-size:11px;font-weight:700;font-family:inherit;}
.tabbar button .i{display:block;font-size:21px;margin-bottom:2px;}
.tabbar button.on{color:var(--g);}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--muted);font-family:inherit;}
.chip.on{background:var(--g);border-color:var(--g);color:#fff;}
.post{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:10px;}
.post .pt{font-weight:800;font-size:15.5px;}
.post .pm{font-size:11.5px;color:var(--muted);margin:3px 0 8px;letter-spacing:.3px;}
.post .pb{font-size:14px;white-space:pre-wrap;color:#2c362b;}
.post .tag{font-size:10.5px;background:#eef4ec;color:var(--g);border-radius:12px;padding:1px 8px;font-weight:700;}
.post .tools{margin-top:10px;display:flex;gap:8px;}
.post.sortable{cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;}
.post.sortable.drag{opacity:.75;box-shadow:0 10px 22px rgba(0,0,0,.18);position:relative;z-index:5;}
.emp{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff;}
.emp .av{width:38px;height:38px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
.emp .info{flex:1;min-width:0;}.emp .nm{font-weight:700;}.emp .meta{font-size:12px;color:var(--muted);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#eef4ec;color:var(--g);font-weight:700;white-space:nowrap;}
.badge.warn{background:#fdecea;color:var(--err);}
.badge.amber{background:#fff7e6;color:var(--amber);}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;opacity:0;transition:.3s;z-index:100;max-width:90%;text-align:center;}
.toast.show{opacity:1;}
.note{background:#fff7e6;border:1px solid #f0dca8;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5a10;margin-bottom:12px;}
.dev{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));right:8px;font-size:11px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 8px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.dev select{padding:4px;font-size:11px;width:auto;border-radius:6px;}
.pinpad{text-align:center;padding:26px 18px;}
.pinpad .dots{font-size:30px;letter-spacing:12px;margin:16px 0;color:var(--g);min-height:44px;}
.pinpad .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.pinpad .grid button{padding:16px 0;font-size:20px;font-weight:700;border:1px solid var(--line);border-radius:12px;background:#fff;font-family:inherit;}
.pay{border:1px solid var(--line);border-radius:12px;background:#fff;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.pay .ym{font-weight:800;}
.pay .amt{color:var(--g);font-weight:800;}
.slip td{padding:6px 4px;font-size:13.5px;border-bottom:1px dashed var(--line);}
.slip td:last-child{text-align:right;font-weight:700;}
.hide{display:none!important;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);gap:8px;}
.set-row:last-child{border-bottom:none;}
.stg-full{background:#fafdf9;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;}
.stg-full .fr{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.stg-full .fr:last-child{border-bottom:none;}
.stg-full .fk{color:var(--muted);flex-shrink:0;}
.stg-full .fr.diff{background:#fff3cd;border-radius:8px;padding:6px 8px;border-bottom:none;}
.stg-full .fr.diff .fv b{color:var(--g);}
.stg-full .fr.diff .old{color:var(--err);text-decoration:line-through;margin-right:6px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="logo.png" onerror="this.style.display='none'" alt="">
    <div class="t">益循生活員工系統</div>
    <div class="role" id="roleTag"></div>
  </header>
  <div class="body" id="app"></div>
</div>

<nav class="tabbar">
  <button data-t="board" class="on" onclick="go('board')"><span class="i">📢</span>佈告欄</button>
  <button data-t="profile" onclick="go('profile')"><span class="i">📝</span>我的資料</button>
  <button data-t="payslip" onclick="go('payslip')"><span class="i">💰</span>薪資條</button>
  <button data-t="settings" id="setTab" class="hide" onclick="go('settings')"><span class="i">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>
<div class="dev">測試身分
  <select id="devRole" onchange="setRole(this.value)">
    <option value="employee">員工(鴻海)</option>
    <option value="manager">主管(巧鈺)</option>
    <option value="admin">管理員(建全)</option>
  </select>
</div>

<script>
// ================= 設定 =================

const SITES = ["中科","鴻海","總部"];

// ================= 示範資料（結構 = 真實 Sheet 分頁） =================
const DB = {

    {userId:"", 工號:"", 姓名:"吳哲安", 角色:"管理員", 分級:["中科","鴻海","總部"], 管轄:[]},
    {userId:"", 工號:"", 姓名:"Ginny 吳佩柔", 角色:"管理員", 分級:["中科","鴻海","總部"], 管轄:[]},
    {userId:"", 工號:"E24M0907", 姓名:"林軒徹", 角色:"管理員", 分級:["中科","鴻海","總部"], 管轄:[]},
    {userId:"U_demo_mgr", 工號:"E25T0729", 姓名:"楊巧鈺", 角色:"主管", 分級:["鴻海"], 管轄:["E24P0506","E26K0110"]},
    {userId:"", 工號:"E26T1020", 姓名:"陳怡安", 角色:"主管", 分級:["中科"], 管轄:["E25K0312"]},
    {userId:"U_demo_emp", 工號:"E24P0506", 姓名:"王小明", 角色:"員工", 分級:["鴻海"], 管轄:[]},

  bulletins: [
    {id:"b0002", 分級:["中科","鴻海","總部"], 標題:"7月薪資發放時間", 內文:"7月薪資預計 8/10 前入帳，薪資條屆時可在本系統「💰薪資條」查看。", 發佈人:"盧建全", 狀態:"published", 時間:"2026-07-09 10:00"},
    {id:"b0003", 分級:["鴻海"], 標題:"鴻海店本週班表已出", 內文:"請至打卡系統確認本週班表，如需調班請於週三前告知店長。", 發佈人:"楊巧鈺", 狀態:"published", 時間:"2026-07-10 18:00"},
    {id:"b0001", 分級:["中科","鴻海","總部"], 標題:"歡迎使用益循生活員工系統", 內文:"佈告欄上線囉！之後公司公告都會發在這裡，記得常來看看 😊", 發佈人:"系統", 狀態:"published", 時間:"2026-07-10 00:00"},
  ],
  roster: [
    {employee_id:"E24P0506", name:"王小明", 分級:"鴻海", title:"廚助", employment_type:"兼職", done:true},
    {employee_id:"E26K0110", name:"李小華", 分級:"鴻海", title:"廚助", employment_type:"兼職", done:false},
    {employee_id:"E25K0312", name:"林志豪", 分級:"中科", title:"廚助", employment_type:"兼職", done:false},
    {employee_id:"E25T0729", name:"楊巧鈺", 分級:"鴻海", title:"店長", employment_type:"正職", done:true},
    {employee_id:"E26T1020", name:"陳怡安", 分級:"中科", title:"儲備幹部", employment_type:"正職", done:true},
  ],
  // 員工完整資料（示範；正式版=employees.json）
  details: {
    E24P0506:{name:"王小明",national_id:"F1********",dob:"1999-05-06",phone:"0912345678",email:"ming@example.com",address:"新北市土城區明德路一段 100 號",ec_name:"王媽媽",ec_relation:"母",ec_phone:"0933111222",bank_name:"國泰世華銀行",account_number:"013000111222",hire_date:"2026-04-01",employment_type:"兼職",title:"廚助",分級:"鴻海",salary:"時薪 190",insurance:"勞保 11100／健保 29500"},
    E26K0110:{name:"李小華",phone:"0955666777",分級:"鴻海",title:"廚助",employment_type:"兼職",hire_date:"2026-06-20"},
    E25K0312:{name:"林志豪",分級:"中科",title:"廚助",employment_type:"兼職"},
    E25T0729:{name:"楊巧鈺",national_id:"A2********",dob:"1996-07-21",phone:"0922333444",email:"chiao@example.com",address:"台中市西屯區文心路 50 號",ec_name:"楊爸爸",ec_relation:"父",ec_phone:"0910222333",bank_name:"玉山銀行",account_number:"808111222333",hire_date:"2025-07-21",employment_type:"正職",title:"店長",分級:"鴻海",salary:"月薪 45,000",insurance:"勞保 45800／健保 45800"},
    E26T1020:{name:"陳怡安",national_id:"B2********",dob:"1998-10-20",phone:"0966777888",email:"yian@example.com",address:"台中市北屯區崇德路 88 號",ec_name:"陳媽媽",ec_relation:"母",ec_phone:"0955444333",bank_name:"國泰世華銀行",account_number:"013555666777",hire_date:"2026-01-05",employment_type:"正職",title:"儲備幹部",分級:"中科",salary:"月薪 45,000",insurance:"勞保 45800／健保 45800"},
  },
  payslips: {
    "E24P0506": [
      {ym:"2026-06", net:18240, items:{"時薪工資":17600,"平日加班費":640}, deduct:{"勞保費":392,"健保費":0}, note:"特休：24 hr（2026-11 到期）"},
      {ym:"2026-05", net:16800, items:{"時薪工資":16800}, deduct:{"勞保費":392}, note:""},
    ]
  },
  settings: {
    field_visibility_employee: ["基本資料","緊急聯絡人","薪轉帳戶","證件上傳"],
    field_visibility_manager: ["基本資料","緊急聯絡人","任職資訊"],
    pin_required_payslip: true,
  },
  staging: [
    {id:"s0001", 工號:"E24P0506", 姓名:"王小明", 欄位:"phone", 欄位名:"手機", 舊值:"0912345678", 新值:"0987654321", 狀態:"待審", 時間:"2026-07-10 20:11"},
  ],
};

// 員工資料欄位定義（展開檢視用；key 對應 details）
const FIELD_DEFS = [
  {sec:"基本資料", fields:[["姓名","name"],["身分證字號","national_id"],["出生年月日","dob"],["手機","phone"],["Email","email"],["戶籍/通訊地址","address"]]},
  {sec:"緊急聯絡人", fields:[["姓名","ec_name"],["關係","ec_relation"],["聯絡電話","ec_phone"]]},
  {sec:"任職資訊", fields:[["到職日","hire_date"],["聘用別","employment_type"],["分級","分級"],["職稱","title"]]},
  {sec:"薪轉帳戶", fields:[["銀行","bank_name"],["帳號","account_number"]]},
  {sec:"薪資／投保（僅管理員）", adminOnly:true, fields:[["薪資","salary"],["投保","insurance"]]},
];

const DEMO_IDENTITY = {
  employee: {userId:"U_demo_emp", name:"王小明", 工號:"E24P0506", role:"員工", sites:["鴻海"]},
  manager:  {userId:"U_demo_mgr", name:"楊巧鈺", 工號:"E25T0729", role:"主管", sites:["鴻海"]},
  admin:    {userId:"U_demo_admin", name:"盧建全", 工號:"E25M0817", role:"管理員", sites:SITES.slice()},
};

let state = { tab:"board", devRole:"employee", me:DEMO_IDENTITY.employee,
  pinOk:false, pinBuf:"", pinStage:null, pinTmp:"", savedPin:"",
  composing:false, editingPost:null, reordering:false, viewSlip:null, editingEmp:null,
  boardSite:"ALL", expandedStaging:null };

// ================= 工具 =================
const $=(s)=>document.querySelector(s);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function isAdmin(){return state.me.role==="管理員";}
function isMgr(){return state.me.role==="主管";}

function setRole(r){
  state.devRole=r; state.me=DEMO_IDENTITY[r];
  state.pinOk=false; state.composing=false; state.editingPost=null; state.reordering=false;
  state.viewSlip=null; state.editingEmp=null; state.expandedStaging=null;
  if(state.tab==="settings"&&!isAdmin())state.tab="board";
  render();
}
function go(t){
  state.tab=t; state.composing=false; state.editingPost=null; state.reordering=false;
  state.viewSlip=null; state.editingEmp=null; state.expandedStaging=null;
  render();
}

// ================= 渲染 =================
function render(){
  $("#roleTag").textContent = `${state.me.name}・${state.me.role}`;
  $("#devRole").value=state.devRole;
  $("#setTab").classList.toggle("hide", !isAdmin());
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("on", b.dataset.t===state.tab));
  const v = { board:boardView, profile:profileView, payslip:payslipView, settings:settingsView }[state.tab] || boardView;
  $("#app").innerHTML = v();
  if(state.reordering)bindSort();
}

// ================= 📢 佈告欄 =================
function visiblePosts(){
  return DB.bulletins
    .filter(p=>p.狀態==="published")
    .filter(p=>isAdmin() ? (state.boardSite==="ALL"||p.分級.includes(state.boardSite))
                         : p.分級.some(s=>state.me.sites.includes(s)));
}
function boardView(){
  if(state.composing)return composeView();
  if(state.reordering)return reorderView();
  const posts=visiblePosts();
  const canPost=isAdmin()||isMgr();
  const siteChips=isAdmin()?`<div class="chip-row" style="margin-bottom:10px">
    ${["ALL",...SITES].map(s=>`<button class="chip ${state.boardSite===s?'on':''}" onclick="state.boardSite='${s}';render()">${s==="ALL"?"全部":s}</button>`).join("")}
  </div>`:"";
  return `
  ${canPost?`<div class="row2" style="margin-bottom:12px">
    <div><button class="btn" style="margin:0" onclick="state.composing=true;state.editingPost=null;render()">＋ 發佈新公告</button></div>
    <div><button class="btn sec" style="margin:0" onclick="state.reordering=true;render()">↕️ 編輯排序</button></div>
  </div>`:""}
  ${siteChips}
  ${posts.length?posts.map(postCard).join(""):'<div class="note">目前沒有公告</div>'}
  <div class="hint" style="text-align:center;margin-top:6px">你看到的是：${isAdmin()?(state.boardSite==="ALL"?"全部分級":state.boardSite):state.me.sites.join("、")} 的公告</div>`;
}
function postCard(p){
  const canEdit=isAdmin()||(isMgr()&&p.分級.some(s=>state.me.sites.includes(s)));
  return `<div class="post">
    <div class="pt">${esc(p.標題)}</div>
    <div class="pm">${p.分級.map(s=>`<span class="tag">${s}</span>`).join(" ")}　${esc(p.發佈人)}・${p.時間}</div>
    <div class="pb">${esc(p.內文)}</div>
    ${canEdit?`<div class="tools">
      <button class="btn sec sm" onclick="editPost('${p.id}')">✎ 編輯</button>
      <button class="btn warn sm" onclick="archivePost('${p.id}')">下架</button>
    </div>`:""}
  </div>`;
}
// ---- 拖曳排序 ----
function reorderView(){
  const posts=visiblePosts();
  return `
  <div class="note">↕️ 按住卡片直接上下拖曳調整順序，調好按「儲存排序」。</div>
  <div id="sortList">${posts.map(p=>`
    <div class="post sortable" data-id="${p.id}">
      <div class="pt">☰　${esc(p.標題)}</div>
      <div class="pm">${p.分級.map(s=>`<span class="tag">${s}</span>`).join(" ")}　${esc(p.發佈人)}</div>
    </div>`).join("")}</div>
  <button class="btn" onclick="saveOrder()">儲存排序</button>
  <button class="btn sec" onclick="state.reordering=false;render()">取消</button>`;
}
function bindSort(){
  const list=$("#sortList");
  if(!list)return;
  let dragEl=null,startY=0;
  list.querySelectorAll(".sortable").forEach(el=>{
    el.addEventListener("pointerdown",e=>{
      dragEl=el;startY=e.clientY;
      el.classList.add("drag");el.setPointerCapture(e.pointerId);
    });
    el.addEventListener("pointermove",e=>{
      if(!dragEl)return;
      dragEl.style.transform=`translateY(${e.clientY-startY}px)`;
      const dr=dragEl.getBoundingClientRect();
      const dmid=dr.top+dr.height/2;
      for(const s of [...list.children].filter(x=>x!==dragEl)){
        const r=s.getBoundingClientRect();
        const mid=r.top+r.height/2;
        if(dmid<mid && s.compareDocumentPosition(dragEl)&Node.DOCUMENT_POSITION_FOLLOWING){
          list.insertBefore(dragEl,s);startY=e.clientY;dragEl.style.transform="";break;
        }
        if(dmid>mid && s.compareDocumentPosition(dragEl)&Node.DOCUMENT_POSITION_PRECEDING){
          list.insertBefore(dragEl,s.nextSibling);startY=e.clientY;dragEl.style.transform="";break;
        }
      }
    });
    const up=()=>{
      if(!dragEl)return;
      dragEl.style.transform="";dragEl.classList.remove("drag");dragEl=null;
    };
    el.addEventListener("pointerup",up);
    el.addEventListener("pointercancel",up);
  });
}

  const ids=[...document.querySelectorAll("#sortList .sortable")].map(el=>el.dataset.id);
  const inSet=new Set(ids);
  const rest=DB.bulletins.filter(p=>!inSet.has(p.id));

function savePost(){
  const sites=[...document.querySelectorAll('[data-site].on')].map(b=>b.dataset.site);
  const title=$("#postTitle").value.trim(), body=$("#postBody").value.trim();
  if(!sites.length){toast("至少選一個分級");return;}
  if(!title||!body){toast("標題與內文必填");return;}
  const push=$("#postPush").checked;
  if(state.editingPost){
    const p=DB.bulletins.find(x=>x.id===state.editingPost);
    Object.assign(p,{分級:sites,標題:title,內文:body});
  }else{
    DB.bulletins.unshift({id:"b"+Date.now(),分級:sites,標題:title,內文:body,發佈人:state.me.name,狀態:"published",時間:new Date().toISOString().slice(0,16).replace("T"," ")});
  }
  state.composing=false;state.editingPost=null;render();
  toast(push?"已發佈 ✓（示範模式：正式版會 LINE 推播給 "+sites.join("、")+"）":"已發佈 ✓");
}

// 完整資料展開（異動欄位標黃、顯示 舊→新）
function fullRecordHtml(empId,changedKey,oldV,newV){
  const d=DB.details[empId]||{};
  const rows=[];
  FIELD_DEFS.forEach(g=>{
    g.fields.forEach(([lbl,key])=>{
      const isDiff=key===changedKey;
      const val=d[key];
      rows.push(`<div class="fr ${isDiff?'diff':''}">
        <span class="fk">${lbl}</span>
        <span class="fv">${isDiff?`<span class="old">${esc(oldV)}</span><b>${esc(newV)}</b>`:(val?esc(val):'<span class="miss-tag">未填寫</span>')}</span>
      </div>`);
    });
  });
  return rows.join("");
}
function empRow(e,isSelf){
  return `<div class="emp" onclick="state.editingEmp='${e.employee_id}';render()">
    <div class="av">${e.name[0]}</div>

// ---- PIN ----
function pinView(){
  const stage=state.pinStage|| (state.savedPin?"enter":"setup1");
  const titles={enter:"輸入 PIN 查看薪資條",setup1:"首次使用：設定 4 位數 PIN",setup2:"再輸入一次確認",reset1:"重設：設定新 PIN",reset2:"再輸入一次確認"};
  return `<div class="card pinpad">
    <div class="sec" style="justify-content:center"><span class="ic">🔒</span>${titles[stage]}</div>
    <div class="dots">${"●".repeat(state.pinBuf.length)}${"○".repeat(4-state.pinBuf.length)}</div>
    <div class="grid">${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k=>k===""?"<span></span>":`<button onclick="pinKey('${k}')">${k}</button>`).join("")}</div>
    <div class="hint" style="margin-top:14px">薪資屬敏感資料，PIN 保護避免手機借人時被查看</div>
  </div>`;
}
function pinKey(k){
  if(k==="⌫"){state.pinBuf=state.pinBuf.slice(0,-1);render();return;}
  if(state.pinBuf.length>=4)return;
  state.pinBuf+=k;
  if(state.pinBuf.length===4)setTimeout(pinDone,150);
  render();
}
function pinDone(){
  const stage=state.pinStage||(state.savedPin?"enter":"setup1");
  if(stage==="enter"){
    if(state.pinBuf===state.savedPin){state.pinOk=true;state.pinBuf="";state.pinStage=null;render();}
    else{toast("PIN 錯誤");state.pinBuf="";render();}
  }else if(stage==="setup1"||stage==="reset1"){
    state.pinTmp=state.pinBuf;state.pinBuf="";state.pinStage=stage==="setup1"?"setup2":"reset2";render();
  }else{
    if(state.pinBuf===state.pinTmp){state.savedPin=state.pinTmp;state.pinOk=true;state.pinBuf="";state.pinStage=null;render();toast("PIN 已設定 ✓");}
    else{toast("兩次輸入不一致，重來");state.pinBuf="";state.pinStage=stage==="setup2"?"setup1":"reset1";render();}
  }
}

function toggleVis(who,f,btn){
  const key="field_visibility_"+who;
  const arr=DB.settings[key];
  const i=arr.indexOf(f);
  if(i>=0)arr.splice(i,1);else arr.push(f);
  btn.classList.toggle("on");toast("已更新（示範模式）");

function addRole(){
  const n=$("#newRoleName").value.trim();
  const sites=[...document.querySelectorAll('[data-ns].on')].map(b=>b.dataset.ns);
  if(!n){toast("請輸入姓名或工號");return;}
  if(!sites.length){toast("至少選一個分級");return;}
  DB.roles.push({userId:"",工號:"",姓名:n,角色:$("#newRoleType").value,分級:sites,管轄:[]});
  render();toast("已新增 ✓（正式版寫入角色表）");
}
function removeRole(name){
  const i=DB.roles.findIndex(r=>r.姓名===name);
  if(i>=0)DB.roles.splice(i,1);
  render();toast("已移除");
}

// ================= 元件 =================
function card(ic,t,inner){return `<div class="card"><div class="sec"><span class="ic">${ic}</span>${t}</div>${inner}</div>`;}
function field(lbl,id,type,val,req,hint){
  return `<label>${lbl}${req?'<span class="req">＊</span>':''}</label>
    <input id="${id}" type="${type}" value="${esc(val||'')}">
    ${hint?`<div class="hint">${hint}</div>`:''}`;
}

// ================= 啟動 =================
async function boot(){
  if(CONFIG.liffId){
    try{ await liff.init({liffId:CONFIG.liffId});
      if(liff.isLoggedIn()){const p=await liff.getProfile();/* Phase B：拿 idToken 給後端驗證+查角色 */}
    }catch(e){console.warn("liff init fail (browser mode)",e);}
  }
  render();
}
boot();
