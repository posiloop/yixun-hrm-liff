<style>
:root{--g:#2E7227;--g2:#3a8a31;--bg:#f4f7f3;--card:#fff;--line:#e2e9e0;--err:#c0392b;--muted:#7a857a;--amber:#b7791f;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:#1d271c;font-size:15px;line-height:1.5;}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom));}
header{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
header img{height:28px;}
header .t{font-size:17px;font-weight:800;}
header .role{margin-left:auto;font-size:12px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;white-space:nowrap;}
.body{padding:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;}
.sec{font-weight:800;color:var(--g);font-size:15px;margin:2px 0 12px;display:flex;align-items:center;gap:7px;}
.sec .ic{width:22px;height:22px;background:var(--g);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
label{display:block;font-size:13px;color:#3a463a;margin:12px 0 5px;font-weight:600;}
label .req{color:var(--err);}
input,select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fcfdfc;}
textarea{min-height:90px;resize:vertical;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--g2);}
input.bad{border-color:var(--err);background:#fdf3f3;}
input.miss{border-color:#f0c5c0;background:#fdf1f0;}
.miss-tag{font-size:10.5px;color:var(--err);background:#fdecea;border-radius:10px;padding:1px 8px;margin-left:6px;font-weight:700;}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
.row2{display:flex;gap:10px;}.row2>div{flex:1;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--g);color:#fff;font-size:16px;font-weight:800;margin-top:8px;font-family:inherit;}
.btn:active{background:var(--g2);}
.btn.sec{background:#eef4ec;color:var(--g);}
.btn.warn{background:#fdecea;color:var(--err);}
.btn.sm{width:auto;padding:8px 14px;font-size:13px;margin:0;}
.back-sticky{position:sticky;top:calc(58px + env(safe-area-inset-top));z-index:8;margin-bottom:12px;box-shadow:0 4px 10px rgba(43,48,58,.08);}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 14px rgba(0,0,0,.06);}
.tabbar button{flex:1;border:none;background:none;padding:9px 0 7px;color:var(--muted);font-size:11px;font-weight:700;font-family:inherit;}
.tabbar button .i{display:block;font-size:21px;margin-bottom:2px;}
.tabbar button.on{color:var(--g);}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--muted);font-family:inherit;}
.chip.on{background:var(--g);border-color:var(--g);color:#fff;}
.chip.term.on{background:var(--err);border-color:var(--err);}
.post{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:10px;}
.post .pt{font-weight:800;font-size:15.5px;}
.post .pm{font-size:11.5px;color:var(--muted);margin:3px 0 8px;letter-spacing:.3px;}
.post .pb{font-size:14px;white-space:pre-wrap;color:#2c362b;}
.post .tag{font-size:10.5px;background:#eef4ec;color:var(--g);border-radius:12px;padding:1px 8px;font-weight:700;}
.post .tools{margin-top:10px;display:flex;gap:8px;}
.post.sortable{cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;}
.post.sortable.drag{opacity:.75;box-shadow:0 10px 22px rgba(0,0,0,.18);position:relative;z-index:5;}
.emp{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff;}
.emp.self{border-color:var(--g);background:#f4faf2;}
.emp.term{opacity:.75;background:#faf5f4;border-color:#eed7d3;}
.emp .av{width:38px;height:38px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
.emp.term .av{background:#b08a84;}
.emp .info{flex:1;min-width:0;}.emp .nm{font-weight:700;}.emp .meta{font-size:12px;color:var(--muted);}
.divider{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:2px;margin:14px 0 8px;display:flex;align-items:center;gap:8px;}
.divider::after{content:"";flex:1;height:1px;background:var(--line);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#eef4ec;color:var(--g);font-weight:700;white-space:nowrap;}
.badge.warn{background:#fdecea;color:var(--err);}
.badge.amber{background:#fff7e6;color:var(--amber);}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;opacity:0;transition:.3s;z-index:100;max-width:90%;text-align:center;}
.toast.show{opacity:1;}
.note{background:#fff7e6;border:1px solid #f0dca8;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a5a10;margin-bottom:12px;}
.dev{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));right:8px;font-size:11px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 8px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.dev select{padding:4px;font-size:11px;width:auto;border-radius:6px;}
.pinpad{text-align:center;padding:26px 18px;}
.pinpad .dots{font-size:30px;letter-spacing:12px;margin:16px 0;color:var(--g);min-height:44px;}
.pinpad .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.pinpad .grid button{padding:16px 0;font-size:20px;font-weight:700;border:1px solid var(--line);border-radius:12px;background:#fff;font-family:inherit;}
.pay{border:1px solid var(--line);border-radius:12px;background:#fff;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.pay .ym{font-weight:800;}
.pay .amt{color:var(--g);font-weight:800;}
.slip td{padding:6px 4px;font-size:13.5px;border-bottom:1px dashed var(--line);}
.slip td:last-child{text-align:right;font-weight:700;}
.hide{display:none!important;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);gap:8px;}
.set-row:last-child{border-bottom:none;}
.stg-full{background:#fafdf9;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;}
.stg-full .fr{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.stg-full .fr:last-child{border-bottom:none;}
.stg-full .fk{color:var(--muted);flex-shrink:0;}
.stg-full .fr.diff{background:#fff3cd;border-radius:8px;padding:6px 8px;border-bottom:none;}
.stg-full .fr.diff .fv b{color:var(--g);}
.stg-full .fr.diff .old{color:var(--err);text-decoration:line-through;margin-right:6px;}
.dep-row{border:1px dashed var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;background:#fcfdfc;animation:pop .28s ease both;}
input[type=date]{min-height:44px;-webkit-appearance:none;appearance:none;background:#fcfdfc;}
/* ===== 第三輪：可愛年輕化 + 陰影 + 動畫 ===== */
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes pop{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:none;}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-2.5px);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
body{background:radial-gradient(120% 60% at 50% 0,#eaf5e7 0,var(--bg) 60%);}
.card{box-shadow:0 6px 18px rgba(46,114,39,.07),0 1.5px 4px rgba(0,0,0,.03);border-radius:18px;animation:cardIn .32s cubic-bezier(.2,.8,.25,1) both;}
.post{border-radius:16px;box-shadow:0 4px 14px rgba(46,114,39,.06);animation:cardIn .3s ease both;}
.emp{border-radius:15px;box-shadow:0 3px 10px rgba(46,114,39,.05);transition:transform .15s,box-shadow .15s;animation:cardIn .28s ease both;}
.emp:active{transform:scale(.98);}
.sec{font-size:16px;}
.sec .ic{width:24px;height:24px;border-radius:9px;box-shadow:0 3px 7px rgba(46,114,39,.25);animation:floaty 3.6s ease-in-out infinite;}
.btn{border-radius:14px;box-shadow:0 5px 13px rgba(46,114,39,.20);transition:transform .12s,box-shadow .12s,background .15s;}
.btn:active{transform:translateY(1px) scale(.985);box-shadow:0 2px 6px rgba(46,114,39,.16);}
.btn.sec{box-shadow:0 3px 9px rgba(46,114,39,.09);}
.btn.warn{box-shadow:0 3px 9px rgba(192,57,43,.13);}
.btn.sm{box-shadow:0 2px 6px rgba(46,114,39,.14);}
header{box-shadow:0 5px 16px rgba(46,114,39,.20);border-radius:0 0 20px 20px;}
header img{filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));}
.tabbar{border-radius:22px 22px 0 0;}
.tabbar button .i{transition:transform .2s cubic-bezier(.2,.9,.3,1.3);}
.tabbar button.on .i{transform:translateY(-2px) scale(1.18);}
.chip{transition:transform .12s,background .15s,box-shadow .15s;}
.chip:active{transform:scale(.94);}
.chip.on{box-shadow:0 3px 8px rgba(46,114,39,.22);}
.toast{animation:toastIn .3s ease;border-radius:24px;box-shadow:0 10px 26px rgba(0,0,0,.3);}
.badge{box-shadow:0 1px 3px rgba(0,0,0,.05);}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(58,138,49,.12);}
/* 子分頁 pills（我的資料分區） */
.subtabs{display:flex;gap:7px;overflow-x:auto;padding:2px 1px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.subtabs::-webkit-scrollbar{display:none;}
.subtabs button{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:22px;padding:8px 15px;font-size:13px;font-weight:800;color:var(--muted);font-family:inherit;white-space:nowrap;transition:transform .12s;box-shadow:0 2px 6px rgba(46,114,39,.05);}
.subtabs button:active{transform:scale(.95);}
.subtabs button.on{background:linear-gradient(135deg,var(--g),var(--g2));border-color:var(--g);color:#fff;box-shadow:0 4px 12px rgba(46,114,39,.28);}
.subtabs .ok{color:var(--g2);font-weight:900;}
.subtabs button.on .ok{color:#d3f0d0;}
/* 彈窗 modal */
.modal-mask{position:fixed;inset:0;background:rgba(20,30,18,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn .2s ease;}
.modal-box{background:#fff;border-radius:22px;max-width:340px;width:100%;padding:24px 20px 18px;box-shadow:0 20px 54px rgba(0,0,0,.32);animation:pop .26s cubic-bezier(.2,.9,.3,1.25);text-align:center;}
.modal-box .mi{font-size:42px;margin-bottom:6px;display:block;animation:floaty 2.6s ease-in-out infinite;}
.modal-box .mt{font-weight:800;font-size:17.5px;margin-bottom:7px;}
.modal-box .mm{font-size:13.5px;color:var(--muted);margin-bottom:18px;line-height:1.6;}
.modal-box .mrow{display:flex;gap:10px;}.modal-box .mrow .btn{margin:0;}
/* 證件上傳 */
.doc-prog{font-size:12.5px;font-weight:800;color:var(--g);background:#eef4ec;border-radius:20px;padding:4px 14px;display:inline-block;margin-bottom:10px;}
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.doc-item{border:1.5px dashed var(--line);border-radius:14px;padding:12px 8px 10px;text-align:center;background:#fcfdfc;position:relative;overflow:hidden;transition:border-color .15s,background .15s;}
.doc-item.has{border-style:solid;border-color:var(--g2);background:#f4faf2;}
.doc-item .dlabel{font-size:12.5px;font-weight:800;color:#3a463a;}
.doc-item .dstate{font-size:11px;color:var(--muted);margin-top:3px;}
.doc-item.has .dstate{color:var(--g2);font-weight:700;}
.doc-item img{width:100%;height:68px;object-fit:cover;border-radius:9px;margin-top:8px;}
.doc-item input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.doc-chk{display:flex;gap:6px;flex-wrap:wrap;}
.doc-chk .d{font-size:11.5px;border-radius:20px;padding:3px 11px;font-weight:700;background:#f1f4f0;color:var(--muted);}
.doc-chk .d.ok{background:#eaf6e8;color:var(--g);}
@media (prefers-reduced-motion:reduce){*{animation:none!important;}}
</style>
</head>

function pinView(){
  const stage=state.pinStage|| (myPin()?"enter":"setup1");
  const titles={enter:"輸入 PIN 進入系統",setup1:"首次登入：設定 4 位數 PIN",setup2:"再輸入一次確認",reset1:"重設：設定新 PIN",reset2:"再輸入一次確認",forgot:"忘記 PIN：輸入您的身分證字號"};
  if(stage==="forgot"){
    return `<div class="card pinpad">
      <div class="sec" style="justify-content:center"><span class="ic">🔑</span>${titles[stage]}</div>
      <input id="forgotId" placeholder="身分證字號（例 A123456789）" style="max-width:280px;margin:14px auto;text-transform:uppercase">
      <button class="btn" style="max-width:280px;margin:6px auto;display:block" onclick="forgotVerify()">驗證並重設 PIN</button>
      <button class="btn sec" style="max-width:280px;margin:6px auto;display:block" onclick="state.pinStage=null;state.pinBuf='';render()">返回輸入 PIN</button>
      <div class="hint" style="margin-top:10px">驗證通過後即可設定新的 PIN 碼</div>
    </div>`;
  }
  return `<div class="card pinpad">
    <div class="sec" style="justify-content:center"><span class="ic">🔒</span>${titles[stage]}</div>
    <div class="dots">${"●".repeat(state.pinBuf.length)}${"○".repeat(4-state.pinBuf.length)}</div>
    <div class="grid">${[1,2,3,4,5,6,7,8,9,"",0,"←"].map(k=>k===""?"<span></span>":`<button onclick="pinKey('${k}')">${k}</button>`).join("")}</div>
    ${stage==="enter"?`<button class="btn sec" style="max-width:260px;margin:16px auto 0;display:block" onclick="state.pinStage='forgot';render()">忘記 PIN 碼？</button>`:""}
    <div class="hint" style="margin-top:14px">通過審核的帳號需以 PIN 保護個人與薪資資料</div>
  </div>`;
}
function pinKey(k){
  if(k==="←"){state.pinBuf=state.pinBuf.slice(0,-1);render();return;}
  if(state.pinBuf.length>=4)return;
  state.pinBuf+=k;
  if(state.pinBuf.length===4)setTimeout(pinDone,150);
  render();
}
function pinDone(){
  const stage=state.pinStage||(myPin()?"enter":"setup1");
  if(stage==="enter"){
    if(state.pinBuf===myPin()){state.appUnlocked=true;state.pinBuf="";state.pinStage=null;render();}
    else{toast("PIN 錯誤");state.pinBuf="";render();}
  }else if(stage==="setup1"||stage==="reset1"){
    state.pinTmp=state.pinBuf;state.pinBuf="";state.pinStage=stage==="setup1"?"setup2":"reset2";render();
  }else{
    if(state.pinBuf===state.pinTmp){state.savedPin[state.me.userId]=state.pinTmp;state.appUnlocked=true;state.pinBuf="";state.pinStage=null;render();toast("PIN 已設定 ✓");}
    else{toast("兩次輸入不一致，重來");state.pinBuf="";state.pinStage=stage==="setup2"?"setup1":"reset1";render();}
  }
}
function forgotVerify(){
  const id=($("#forgotId").value||"").toUpperCase().trim();
  if(!/^[A-Z][12]\d{8}$/.test(id)){toast("身分證字號格式有誤");return;}
  // 正式版：後端核對本人身分證；示範模式格式對即通過
  toast("驗證通過 ✓ 請設定新 PIN");
  state.pinStage="reset1";state.pinBuf="";render();
}

function bindSort(){
  const list=$("#sortList");
  if(!list)return;
  let dragEl=null,startY=0;
  list.querySelectorAll(".sortable").forEach(el=>{
    el.addEventListener("pointerdown",e=>{
      dragEl=el;startY=e.clientY;
      el.classList.add("drag");el.setPointerCapture(e.pointerId);
    });
    el.addEventListener("pointermove",e=>{
      if(!dragEl)return;
      dragEl.style.transform=`translateY(${e.clientY-startY}px)`;
      const dr=dragEl.getBoundingClientRect();
      const dmid=dr.top+dr.height/2;
      for(const s of [...list.children].filter(x=>x!==dragEl)){
        const r=s.getBoundingClientRect();
        const mid=r.top+r.height/2;
        if(dmid<mid && s.compareDocumentPosition(dragEl)&Node.DOCUMENT_POSITION_FOLLOWING){
          list.insertBefore(dragEl,s);startY=e.clientY;dragEl.style.transform="";break;
        }
        if(dmid>mid && s.compareDocumentPosition(dragEl)&Node.DOCUMENT_POSITION_PRECEDING){
          list.insertBefore(dragEl,s.nextSibling);startY=e.clientY;dragEl.style.transform="";break;
        }
      }
    });
    const up=()=>{
      if(!dragEl)return;
      dragEl.style.transform="";dragEl.classList.remove("drag");dragEl=null;
    };
    el.addEventListener("pointerup",up);
    el.addEventListener("pointercancel",up);
  });
}

    ${field("眷屬生日","dep_d_"+i,"date",x.d,false)}
  </div>`;
}
function harvestProf(){
  document.querySelectorAll("#app input,#app select,#app textarea").forEach(el=>{
    if(el.id&&el.type!=="file")state.profDraft[el.id]=el.value;
  });
}
function switchProfTab(sec){harvestProf();state.profTab=sec;render();}
function addDep(){
  harvestProf();
  const d=DB.details[state.me.工號]||(DB.details[state.me.工號]={});
  (d.deps||(d.deps=[])).push({n:"",r:"",d:""});
  render();
}
function submitProfile(){
  harvestProf();
  toast("已送出審核 ✓（示範模式：正式版進入 待審 → 管理員核准 → 寫入 employees.json）");
}
function sectionDone(key,d){
  const val=(id,dk)=>{const dv=state.profDraft[id];return String(dv!=null?dv:(d[dk]||"")).trim();};
  if(key==="基本資料")return !!(val("f_name","name")&&val("f_id","national_id")&&val("f_dob","dob")&&val("f_phone","phone")&&val("f_addr","address"));
  if(key==="緊急聯絡人")return !!(val("f_ecn","ec_name")&&val("f_ecr","ec_relation")&&val("f_ecp","ec_phone"));
  if(key==="薪轉帳戶")return !!val("f_acct","account_number");
  if(key==="健保眷屬")return true;
  if(key==="證件上傳")return docCount(d)>=DOC_DEFS.length;
  return false;
}
// ---- 證件上傳（拍照/選圖，示範模式存 dataURL；完成度可視） ----
function docUploadHtml(d){
  const o=d.docs||{}, n=docCount(d);
  return `<div class="doc-prog">已上傳 ${n}/${DOC_DEFS.length}</div>
    <div class="doc-grid">${DOC_DEFS.map(([lbl,k])=>{
      const has=o[k];
      return `<label class="doc-item ${has?"has":""}">
        <div class="dlabel">${lbl}</div>
        <div class="dstate">${has?"✓ 已上傳":"點此上傳／拍照"}</div>
        ${has&&has.url?`<img src="${has.url}" alt="">`:""}
        <input type="file" accept="image/*" onchange="docUpload('${k}',this)">
      </label>`;
    }).join("")}</div>
    <div class="hint">身分證正反面／存摺封面／體檢報告；手機可直接拍照。資料僅管理員與您本人可見。</div>`;
}
function docUpload(k,input){
  const f=input.files&&input.files[0];
  if(!f)return;
  if(f.size>8*1024*1024){toast("圖片過大（上限 8MB）");input.value="";return;}
  const d=DB.details[state.me.工號]||(DB.details[state.me.工號]={});
  const r=new FileReader();
  r.onload=e=>{harvestProf();(d.docs||(d.docs={}))[k]={name:f.name,url:e.target.result};render();toast("已上傳 ✓");};
  r.readAsDataURL(f);
}
// 主管／管理員檢視：證件上傳完成度可視（管理員另可看縮圖）
function docStatusHtml(d){
  const o=d.docs||{}, n=docCount(d);
  const showImg=isAdmin()&&n>0;
  return card("📎","證件上傳　"+n+"/"+DOC_DEFS.length,
    `<div class="doc-chk">${DOC_DEFS.map(([lbl,k])=>`<span class="d ${o[k]?"ok":""}">${o[k]?"✓":"✗"} ${lbl}</span>`).join("")}</div>`+
    (showImg?`<div class="doc-grid" style="margin-top:10px">${DOC_DEFS.filter(([_,k])=>o[k]&&o[k].url).map(([lbl,k])=>`<div class="doc-item has"><div class="dlabel">${lbl}</div><img src="${o[k].url}" alt=""></div>`).join("")}</div>`:""));
}
function mgrProfileView(){
  if(state.editingEmp)return empDetailView();
  const self=DB.roster.find(r=>r.employee_id===state.me.工號);
  const staff=DB.roster.filter(r=>state.me.sites.includes(r.分級)&&r.employee_id!==state.me.工號&&!r.terminated);
  return `
  <div class="note">👥 你的資料與管轄員工（分級：${state.me.sites.join("、")}）。異動走管理員審核。</div>
  <div class="divider">我自己</div>
  ${self?empRow(self,true):""}
  <div class="divider">所屬員工</div>
  ${staff.map(e=>empRow(e,false)).join("")||'<div class="hint">無管轄員工</div>'}`;
}
function adminProfileView(){
  if(state.editingEmp)return empDetailView();
  const pending=DB.staging.filter(s=>s.狀態==="待審");
  const f=state.rosterFilter;
  const list=DB.roster.filter(e=>{
    if(f==="離職")return e.terminated;
    if(e.terminated)return false;
    return f==="ALL"||e.分級===f;
  });
  return `
  ${pending.length?card("🔔","待審核異動（"+pending.length+"）",pending.map(stagingRow).join("")):""}
  <div class="chip-row" style="margin-bottom:10px">
    ${["ALL",...SITES,"離職"].map(s=>`<button class="chip ${s==='離職'?'term':''} ${f===s?'on':''}" onclick="state.rosterFilter='${s}';render()">${s==="ALL"?"全部":s}</button>`).join("")}
  </div>
  <input class="search" placeholder="🔍 搜尋姓名" style="margin-bottom:10px" oninput="filterRoster(this.value)">
  <div id="roster">${list.map(e=>empRow(e,false)).join("")||'<div class="hint" style="text-align:center;padding:16px">此分類沒有員工</div>'}</div>`;
}
function stagingRow(s){
  const open=state.expandedStaging===s.id;
  return `
    <div class="set-row" style="flex-wrap:wrap">
      <div style="flex:1;min-width:0"><b>${s.姓名}</b> <span class="hint">${s.欄位名}：<span style="color:var(--err);text-decoration:line-through">${esc(s.舊值)}</span> → <b style="color:var(--g)">${esc(s.新值)}</b>・${s.時間}</span></div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn sec sm" onclick="state.expandedStaging=${open?'null':`'${s.id}'`};render()">${open?"收合":"展開全部資料"}</button>
        <button class="btn sm" onclick="approveStaging('${s.id}',true)">核准</button>
        <button class="btn warn sm" onclick="approveStaging('${s.id}',false)">退回</button>
      </div>
      ${open?`<div class="stg-full" style="width:100%">${fullRecordHtml(s.工號,s.欄位,s.舊值,s.新值)}</div>`:""}
    </div>`;
}
function fullRecordHtml(empId,changedKey,oldV,newV){
  const d=DB.details[empId]||{};
  const rows=[];
  FIELD_DEFS.forEach(g=>{
    if(g.custom==="deps"){
      const deps=(d.deps||[]);
      rows.push(`<div class="fr"><span class="fk">健保眷屬</span><span class="fv">${deps.length?deps.map(x=>`${esc(x.n)}(${esc(x.r)})`).join("、"):'<span class="miss-tag">無</span>'}</span></div>`);
      return;
    }
    g.fields.forEach(([lbl,key])=>{
      const isDiff=key===changedKey;
      const val=d[key];
      const opt=OPT_KEYS.has(key);
      rows.push(`<div class="fr ${isDiff?'diff':''}">
        <span class="fk">${lbl}</span>
        <span class="fv">${isDiff?`<span class="old">${esc(oldV)}</span><b>${esc(newV)}</b>`:(val?esc(val):(opt?'<span class="hint">—</span>':'<span class="miss-tag">未填寫</span>'))}</span>
      </div>`);
    });
  });
  return rows.join("");
}
function empRow(e,isSelf){
  const dc=docCount(DB.details[e.employee_id]||{});
  const docBadge=e.terminated?"":`<span class="badge ${dc>=DOC_DEFS.length?'':'warn'}">證件 ${dc}/${DOC_DEFS.length}</span>`;
  return `<div class="emp ${isSelf?'self':''} ${e.terminated?'term':''}" onclick="enterSub(()=>{state.editingEmp='${e.employee_id}';})">
    <div class="av">${e.name[0]}</div>
    <div class="info"><div class="nm">${e.name}${isSelf?' <span class="badge amber">我</span>':''} <span class="badge">${e.employment_type}</span>${e.terminated?` <span class="badge warn">離職 ${e.term_date}</span>`:''}</div>
      <div class="meta">${e.分級}・${e.title}・${e.employee_id}</div></div>
    <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
      ${e.terminated?"":(e.done?'<span class="badge">已填</span>':'<span class="badge warn">待填</span>')}
      ${docBadge}
    </div>
    <div style="color:#bbb">›</div></div>`;
}
function filterRoster(q){
  q=q.trim();
  const f=state.rosterFilter;
  const list=DB.roster.filter(e=>{
    if(f==="離職"){if(!e.terminated)return false;}
    else{if(e.terminated)return false;if(f!=="ALL"&&e.分級!==f)return false;}
    return !q||e.name.includes(q);
  });
  $("#roster").innerHTML=list.map(e=>empRow(e,false)).join("")||'<div class="hint" style="text-align:center;padding:16px">無符合</div>';
}
function empDetailView(){
  const e=DB.roster.find(x=>x.employee_id===state.editingEmp)||{};
  const d=DB.details[state.editingEmp]||{};
  const vis=isAdmin()?null:DB.settings.field_visibility_manager;
  const secs=FIELD_DEFS.filter(g=>{
    if(g.adminOnly)return isAdmin();
    if(g.mgrHidden&&isMgr()&&state.editingEmp!==state.me.工號)return false;   // 眷屬主管不可視
    return !vis||vis.includes(g.sec)||g.custom;
  });
  return `
  ${backBtn("返回名單")}
  <div class="note">👤 <b>${e.name}</b>（${e.employee_id}）${e.terminated?`<span class="badge warn">已離職 ${e.term_date}・${e.term_type||""}</span>`:""} 完整資料${isAdmin()?"（管理員檢視＝全部欄位）":"（依你的可見範圍）"}；<span class="miss-tag">未填寫</span> 欄位淡紅提示。</div>
  ${secs.map(g=>{
    if(g.custom==="deps"){
      const deps=(d.deps||[]);
      return card("👨‍👩‍👧","健保眷屬",deps.length?deps.map(x=>`<div class="dep-row">${esc(x.n)}（${esc(x.r)}）${esc(x.d)}</div>`).join(""):'<div class="hint">無眷屬<span class="miss-tag">未填寫</span></div>');
    }
    return card("📄",g.sec,
      g.fields.map(([lbl,key])=>{
        const val=d[key]||"";
        const opt=OPT_KEYS.has(key);
        return `<label>${lbl}${(val||opt)?"":'<span class="miss-tag">未填寫</span>'}</label>
          <input class="${(val||opt)?'':'miss'}" value="${esc(val)}" placeholder="${val?'':(opt?'選填':'尚未填寫')}">`;
      }).join(""));
  }).join("")}
  ${docStatusHtml(d)}
  ${isAdmin()&&!e.terminated?(state.terminating?terminateForm(e):`<button class="btn warn" onclick="state.terminating=true;render()">🚪 辦理離職</button>`):""}
  <button class="btn" onclick="toast('已送出 ✓（示範模式：正式版寫入 staging 待管理員核准）')">儲存異動</button>`;
}
function terminateForm(e){
  return card("🚪","辦理離職（"+e.name+"）",`
    ${field("離職日期","t_date","text","",true,"西元 YYYY-MM-DD")}
    <label>離職類型<span class="req">＊</span></label>
    <select id="t_type"><option>自願離職</option><option>非自願離職（資遣）</option><option>短期合約期滿</option><option>協議離職</option></select>
    ${field("非自願預告日（資遣才填）","t_notice","text","",false,"依年資 10/20/30 日前預告")}
    ${field("離職備註","t_note","text","",false)}
    <div class="row2">
      <div><button class="btn warn" onclick="doTerminate('${e.employee_id}')">確認辦理離職</button></div>
      <div><button class="btn sec" onclick="state.terminating=false;render()">取消</button></div>
    </div>`);
}
function doTerminate(id){
  const dt=$("#t_date").value.trim();
  if(!dt){toast("離職日期必填");return;}
  const e=DB.roster.find(x=>x.employee_id===id);
  e.terminated=true;e.term_date=dt;e.term_type=$("#t_type").value;
  const d=DB.details[id]||(DB.details[id]={});
  d.term_date=dt;d.term_type=$("#t_type").value;d.term_notice=$("#t_notice").value.trim();d.term_note=$("#t_note").value.trim();
  state.terminating=false;history.back();
  toast("已辦理離職 ✓（正式版：寫入 employees.json termination 欄位＋自動搬離職資料夾）");
}
function approveStaging(id,ok){
  const s=DB.staging.find(x=>x.id===id);
  s.狀態=ok?"已生效":"退回";
  if(ok&&DB.details[s.工號])DB.details[s.工號][s.欄位]=s.新值;
  state.expandedStaging=null;
  render();toast(ok?"已核准 ✓（正式版：自動合併進 employees.json）":"已退回");
}

// ================= 💰 薪資條 =================
function payslipView(){
  if(state.viewSlip)return slipDetail();
  let slips;
  if(isAdmin()) slips=Object.entries(DB.payslips).flatMap(([id,arr])=>arr.map(s=>({...s,who:rosterName(id)})));
  else if(isMgr()){
    const mine=DB.roles.find(r=>r.userId===state.me.userId)?.管轄||[];
    slips=Object.entries(DB.payslips).filter(([id])=>mine.includes(id)||id===state.me.工號).flatMap(([id,arr])=>arr.map(s=>({...s,who:rosterName(id)})));
  } else slips=(DB.payslips[state.me.工號]||[]).map(s=>({...s,who:""}));
  return `
  <div class="note">💰 ${isAdmin()?"全員":"你可查看"}的薪資條（歷史所有月份）。點開看明細、可下載 PDF。</div>
  ${slips.length?slips.map(s=>`
    <div class="pay" onclick='state.viewSlip=${JSON.stringify(JSON.stringify(s))};state.viewSlip=JSON.parse(state.viewSlip);history.pushState({sub:1},"");render()'>
      <div><div class="ym">${s.ym}${s.who?"・"+s.who:""}</div><div class="hint">實領</div></div>
      <div class="amt">$ ${s.net.toLocaleString()}</div>
    </div>`).join(""):'<div class="note">目前沒有薪資條紀錄</div>'}
  <button class="btn sec" onclick="state.appUnlocked=false;state.pinStage='reset1';state.pinBuf='';render()">🔑 重設 PIN 碼</button>`;
}
function rosterName(id){const r=DB.roster.find(x=>x.employee_id===id);return r?r.name:id;}
function slipDetail(){
  const s=state.viewSlip;
  return `
  ${backBtn("返回列表")}
  <div class="card">
    <div class="sec"><span class="ic">💰</span>${s.ym} 薪資條${s.who?"・"+s.who:""}</div>
    <table class="slip" style="width:100%">
      ${Object.entries(s.items).map(([k,v])=>`<tr><td>${k}</td><td>$ ${v.toLocaleString()}</td></tr>`).join("")}
      ${Object.entries(s.deduct).map(([k,v])=>`<tr><td>${k}</td><td style="color:var(--err)">− $ ${v.toLocaleString()}</td></tr>`).join("")}
      <tr><td style="font-weight:800">實領所得</td><td style="color:var(--g);font-size:16px">$ ${s.net.toLocaleString()}</td></tr>
    </table>
    ${s.note?`<div class="hint" style="margin-top:8px">📎 ${s.note}</div>`:""}
    <button class="btn" onclick="toast('示範模式：正式版直接下載 Drive 上的定版 PDF')">⬇️ 下載 PDF</button>
  </div>`;
}

// ================= ⚙️ 設定（管理員；底部分頁最右） =================
function settingsView(){
  if(!isAdmin())return boardView();
  return `
  ${card("👑","管理員／主管名單",`
    ${DB.roles.filter(r=>r.角色!=="員工").map(r=>`
      <div class="set-row">
        <div><b>${r.姓名}</b> <span class="badge ${r.角色==='管理員'?'amber':''}">${r.角色}</span><br>
          <span class="hint">分級：${r.分級.join("、")||"—"}${r.管轄.length?"｜管轄 "+r.管轄.length+" 人":""}</span></div>
        <button class="btn warn sm" onclick="removeRole('${r.姓名}')">移除</button>
      </div>`).join("")}
    <label>新增人員（姓名或工號）</label>
    <div class="row2"><div><input id="newRoleName" placeholder="例：E26T1206 或 張弘毅"></div><div>
      <select id="newRoleType"><option>主管</option><option>管理員</option></select></div></div>
    <label>所屬分級（可多選）</label>
    <div class="chip-row">${SITES.map(s=>`<button class="chip" data-ns="${s}" onclick="this.classList.toggle('on')">${s}</button>`).join("")}</div>
    <button class="btn" onclick="addRole()">➕ 新增</button>
  `)}
  ${card("👁️","欄位可見度",`
    <label>員工可看/可編</label>
    <div class="chip-row">${["基本資料","緊急聯絡人","薪轉帳戶","健保眷屬","證件上傳"].map(f=>`<button class="chip ${DB.settings.field_visibility_employee.includes(f)?'on':''}" onclick="toggleVis('employee','${f}',this)">${f}</button>`).join("")}</div>
    <label>主管可看（管轄員工）</label>
    <div class="chip-row">${["基本資料","緊急聯絡人","任職資訊","薪轉帳戶"].map(f=>`<button class="chip ${DB.settings.field_visibility_manager.includes(f)?'on':''}" onclick="toggleVis('manager','${f}',this)">${f}</button>`).join("")}</div>
    <div class="hint" style="margin-top:8px">薪資／投保＝永遠僅管理員；健保眷屬＝主管永遠不可視（皆寫死，不在此開放）</div>
  `)}
  ${card("🔒","安全",`
    <div class="set-row"><div>首次登入需設定 PIN（審核通過後啟用）<div class="hint">全站保護；忘記可用身分證字號重設</div></div>
      <span class="badge">固定啟用</span></div>
  `)}`;
}
function toggleVis(who,f,btn){
  const key="field_visibility_"+who;
  const arr=DB.settings[key];
  const i=arr.indexOf(f);
  if(i>=0)arr.splice(i,1);else arr.push(f);
  btn.classList.toggle("on");toast("已更新（示範模式）");
}
function addRole(){
  const n=$("#newRoleName").value.trim();
  const sites=[...document.querySelectorAll('[data-ns].on')].map(b=>b.dataset.ns);
  if(!n){toast("請輸入姓名或工號");return;}
  if(!sites.length){toast("至少選一個分級");return;}
  DB.roles.push({userId:"",工號:"",姓名:n,角色:$("#newRoleType").value,分級:sites,管轄:[]});
  render();toast("已新增 ✓（正式版寫入角色表）");
}
function removeRole(name){
  const i=DB.roles.findIndex(r=>r.姓名===name);
  if(i>=0)DB.roles.splice(i,1);
  render();toast("已移除");
}

// ================= 元件 =================
function card(ic,t,inner){return `<div class="card"><div class="sec"><span class="ic">${ic}</span>${t}</div>${inner}</div>`;}
function field(lbl,id,type,val,req,hint){
  const v=state.profDraft[id]!=null?state.profDraft[id]:(val||'');
  return `<label>${lbl}${req?'<span class="req">＊</span>':''}</label>
    <input id="${id}" type="${type||'text'}" value="${esc(v)}">
    ${hint?`<div class="hint">${hint}</div>`:''}`;
}

// ================= 啟動 =================
async function boot(){
  if(CONFIG.liffId){
    try{ await liff.init({liffId:CONFIG.liffId});
      if(liff.isLoggedIn()){const p=await liff.getProfile();/* Phase B：拿 idToken 給後端驗證+查角色 */}
    }catch(e){console.warn("liff init fail (browser mode)",e);}
  }
  render();
}
boot();
</script>
